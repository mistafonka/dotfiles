font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13.0

symbol_map U+1F300-U+1FAFF Noto Color Emoji

font_features FiraCodeNerdFontMono-Regular +zero +ss01 +ss02 +ss03 +ss04 +ss05 +cv31

disable_ligatures never

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

cursor #FFFFFF
cursor_text_color background

shell_integration enabled
term xterm-kitty

allow_remote_control yes

remember_window_size yes
initial_window_width 115c
initial_window_height 32c

hide_window_decorations yes
confirm_os_window_close 0

background_opacity 0.82
dynamic_background_opacity yes

window_padding_width 10

repaint_delay 10
input_delay 3
sync_to_monitor yes

copy_on_select yes
strip_trailing_spaces smart

enable_audio_bell no
visual_bell_duration 0

tab_bar_style hidden

foreground              #D4D4D4
background              #050505

selection_foreground    #050505
selection_background    #7A5AF8

url_color               #7AA2F7

active_border_color     #7A5AF8
inactive_border_color   #1A1A1A

color0  #111111
color8  #444444

color1  #F7768E
color9  #FF7A93

color2  #9ECE6A
color10 #B9F27C

color3  #E0AF68
color11 #F5C06A

color4  #7AA2F7
color12 #89B4FA

color5  #BB9AF7
color13 #CBA6F7

color6  #7DCFFF
color14 #89DCEB

color7  #C0CAF5
color15 #FFFFFF
