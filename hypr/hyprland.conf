$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$browser = firefox

env = XDG_DATA_DIRS,/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

exec-once = awww-daemon
exec-once = awww img ~/Wallpapers/allblackbluestripe.png
exec-once = waybar
exec-once = mako

bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, W, exec, $terminal
bind = $mainMod, E, exec, MOZ_ENABLE_WAYLAND=1 $browser
bind = $mainMod, SPACE, exec, ~/.local/bin/fuzzletoggle
bind = $mainMod, C, exec, ~/.local/bin/autoclick

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86FullScreen, fullscreen

bind = , XF86LaunchA, exec, mkdir -p ~/Screenshots && hyprshot -m output -o ~/Screenshots
bind = CTRL, XF86LaunchA, exec, mkdir -p ~/Screenshots && hyprshot -m region -o ~/Screenshots

general {
    border_size = 2
    gaps_out = 12.5
    gaps_in = 5

col.active_border = rgb(ffffff) rgb(a9dfff) 45deg
col.inactive_border = rgba(0f2035cc)
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
    }
}

animations {
    enabled = true

    bezier = smooth,0.25,0.1,0.25,1.0

    animation = windows,1,5,smooth
    animation = fade,1,5,smooth
    animation = workspaces,1,6,smooth
}
